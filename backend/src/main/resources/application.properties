spring.application.name=younyx-backend

# Database — your values
spring.datasource.url=jdbc:mysql://192.168.1.104:3306/younyx?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Mysql@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Do NOT let Hibernate auto-create incompatible DDL (we will use Flyway)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway migrations enabled
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
app.jwt.secret=ChangeThisToA_Long_Random_Secret_1234567890_XYZ
app.jwt.expiration-ms=86400000

# -------------- FILE UPLOAD SETTINGS --------------
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
